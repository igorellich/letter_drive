version: '3.8'
services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Анонимный том, чтобы не затереть модули внутри контейнера локальными
    environment:
      - CHOKIDAR_USEPOLLING=true # Помогает подхватывать изменения файлов в Docker на Windows/Mac
